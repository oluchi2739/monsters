<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <title>Monsters</title>

    <!-- iPad / PWA / 縦画面向け -->
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="screen-orientation" content="portrait">
    <meta name="orientation" content="portrait">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Monsters">
    <meta name="theme-color" content="#000000">

    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #unity-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh;
        overflow: hidden;
        background: #000;
      }

      #unity-canvas {
        width: 100vw !important;
        height: 100dvh !important;
        display: block;
        background: #000;
      }

      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      #unity-warning {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        z-index: 10;
      }

      #rotate-warning {
        display: none;
        position: fixed;
        z-index: 99999;
        inset: 0;
        background: #000;
        color: #fff;
        font-size: 28px;
        font-family: sans-serif;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }

      @media screen and (orientation: landscape) {
        #rotate-warning {
          display: flex;
        }

        #unity-container {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div id="rotate-warning">
      たて向きでプレイしてください
    </div>

    <div id="unity-container">
      <canvas id="unity-canvas" width="900" height="1600" tabindex="-1"></canvas>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"></div>
    </div>

    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("ServiceWorker.js");
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }

        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);

        if (type == "error") {
          div.style = "background: red; padding: 10px;";
        } else {
          if (type == "warning") {
            div.style = "background: yellow; padding: 10px;";
          }

          setTimeout(function () {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }

        updateBannerVisibility();
      }

      function resizeUnityCanvas() {
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";
      }

      window.addEventListener("resize", resizeUnityCanvas);
      window.addEventListener("orientationchange", function () {
        setTimeout(resizeUnityCanvas, 300);
      });

      resizeUnityCanvas();

      document.addEventListener("gesturestart", function (e) {
        e.preventDefault();
      });

      document.addEventListener("touchmove", function (e) {
        e.preventDefault();
      }, { passive: false });

      function tryLockPortrait() {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock("portrait").catch(function () {});
        }
      }

      document.addEventListener("pointerdown", tryLockPortrait, { once: true });

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/1.0.loader.js";

      var config = {
        dataUrl: buildUrl + "/1.0.data.unityweb",
        frameworkUrl: buildUrl + "/1.0.framework.js.unityweb",
        codeUrl: buildUrl + "/1.0.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Monsters",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;

      script.onload = function () {
        createUnityInstance(canvas, config, function (progress) {
          progressBarFull.style.width = 100 * progress + "%";
        }).then(function (unityInstance) {
          loadingBar.style.display = "none";
        }).catch(function (message) {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
